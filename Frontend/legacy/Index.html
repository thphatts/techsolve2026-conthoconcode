<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Trang Chủ – Smart Fridge</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'VT323', monospace;
      background: #b8a050;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      letter-spacing: 0.5px;
    }

    /* ── Phone shell (Pixel hóa: viền 4px, không bo góc) ── */
    .phone {
      width: 375px;
      height: 812px;
      border: 4px solid #222;
      border-radius: 0;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #fdf5c0;
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
    }

    /* ── Status bar ── */
    .sb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 16px;
      color: #333;
      position: relative;
      flex-shrink: 0;
      background: transparent;
    }

    .sb-notch {
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .sb-battery {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Icon pin pixel */
    .battery-icon {
      width: 22px;
      height: 12px;
      border: 2px solid #333;
      position: relative;
    }

    .battery-icon::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      background: #333;
    }

    .battery-level {
      height: 100%;
      width: 87%;
      background: #4ade80;
    }

    /* ── ROOM ── */
    .room {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-top: 4px solid #333;
      background: url('../assets/background.png') center 8% / cover no-repeat;
    }

    .fridge-link,
    .cat-area {
      position: absolute;
      z-index: 1;
    }

    /* Tủ lạnh */
    .fridge-link {
      position: absolute;
      left: 10px;
      bottom: 0;
      top: 45px;
      width: 90%;
      z-index: 10;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .fridge-link:hover {
      transform: scale(1.02);
    }

    .fridge-link img {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      display: block;
    }

    /* Mèo area */
    .cat-area {
      position: absolute;
      left: 60px;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      animation: bounce 3s infinite ease-in-out;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .cat-img {
      width: 230px;
      image-rendering: pixelated;
      display: block;
      flex-shrink: 0;
    }

    /* ── BONG BÓNG THOẠI PIXEL 100% ── */
    .bubble {
      background: #fff;
      border: 4px solid #222;
      border-radius: 0;
      padding: 10px 16px;
      font-family: 'VT323', monospace;
      font-size: 26px;
      color: #111;
      text-align: center;
      position: relative;
      margin-bottom: 25px;
      box-shadow: 6px 6px 0 #222;
      white-space: nowrap;
      right: -20px;
      top: 10px;
      letter-spacing: 1px;
    }

    .bubble::before {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 24px;
      width: 16px;
      height: 4px;
      background: #fff;
      z-index: 2;
    }

    .bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 24px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-left: 4px solid #222;
      border-right: 4px solid #222;
      border-bottom: 4px solid #222;
      box-shadow: 6px 6px 0 #222;
      z-index: 1;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex;
      background: #fff;
      border-top: 4px solid #222;
      padding: 12px 10px 24px;
      flex-shrink: 0;
    }

    .nav-img-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .nav-img-row img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .nav-img-row img:active {
      transform: scale(0.9);
    }

    .nav-img-row img.center-btn {
      width: 60px;
      height: 60px;
      margin-top: -15px;
    }

    /* ── Camera Modal ── */
    .cam-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cam-modal.show {
      display: flex;
    }

    .cam-full-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
      z-index: 1002;
      pointer-events: none;
    }

    #camStream {
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1001;
    }

    .cam-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 2000;
      display: none;
    }

    .cam-overlay-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      border: 4px solid #fff;
      border-radius: 0;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 20px;
      font-family: 'VT323', monospace;
      z-index: 1005;
    }

    .cam-capture-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      cursor: pointer;
      z-index: 1005;
      transition: transform 0.1s;
    }

    .cam-capture-btn:active {
      transform: translateX(-50%) scale(0.9);
    }

    /* ── PIXEL STYLES CHO MODAL VÍ ── */
    .modal-bg {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 3000;
      /* Nổi lên trên cùng */
      align-items: flex-end;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-content {
      width: 100%;
      background: #fff;
      border-top: 4px solid #222;
      padding: 24px 20px 40px;
      z-index: 3001;
    }

    .pixel-box-sm {
      border-radius: 0 !important;
      border: 3px solid #222 !important;
      box-shadow: 2px 2px 0 #222;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .pixel-box-sm:active {
      transform: translate(2px, 2px) !important;
      box-shadow: 0 0 0 #222 !important;
    }

    .pixel-box {
      border-radius: 0 !important;
      border: 3px solid #222 !important;
      background: #fff;
      box-shadow: 4px 4px 0 #222;
    }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #000;
      color: #00e5a0;
      border: 4px solid #00e5a0;
      padding: 10px 20px;
      border-radius: 0;
      font-size: 20px;
      font-family: 'VT323', monospace;
      opacity: 0;
      transition: all 0.3s;
      z-index: 4000;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 6px 6px 0 rgba(0, 229, 160, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div class="phone">

    <div class="sb">
      <div class="sb-time">10:09</div>
      <div class="sb-notch"></div>
      <div class="sb-battery">
        <span>🔋</span>
        <span>87%</span>
      </div>
    </div>

    <div class="room">
      <a href="tu_lanh.html" class="fridge-link">
        <img src="../assets/tulanh.png" alt="Tủ lạnh" id="fridgeImg" />
      </a>

      <div class="cat-area">
        <div class="bubble">
          Hôm nay ăn gì nè?
        </div>
        <img src="../assets/meodung.gif" alt="Mèo" class="cat-img" />
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-img-row">
        <img src="../assets/nuttrangchu.png" alt="Trang chủ" onclick="location.href='Index.html'" />
        <img src="../assets/nutthucpham.png" alt="Thực phẩm" onclick="location.href='Danh_sach_thuc_pham.html'" />
        <img src="../assets/nutchup.png" alt="Chụp ảnh" id="camBtnImg" class="center-btn" />

        <img src="../assets/nutvi.png" alt="Ví" onclick="openWalletModal()" />

        <img src="../assets/nutcaidat.png" alt="Cài đặt" />
      </div>
    </div>

    <div class="cam-modal" id="camModal">
      <video id="camStream" autoplay playsinline></video>
      <img src="../assets/manhinhchupbill.png" class="cam-full-img" alt="Giao diện chụp hóa đơn" />
      <div class="cam-flash" id="camFlash"></div>

      <button class="cam-overlay-close" id="closeCamBtn">Đóng</button>
      <img src="../assets/camera.png" class="cam-capture-btn" id="captureBtn" alt="Chụp ảnh">
    </div>

    <div class="modal-bg" id="walletModalBg">
      <div class="modal-content">
        <h3 style="font-size:30px; margin-bottom: 5px;">Chi tiêu tháng 5...</h3>
        <p style="margin-bottom:20px; font-size:18px; color:#777;">Quản lý thực phẩm</p>

        <div class="pixel-box" style="padding:15px; margin-bottom:20px;">
          <h4
            style="font-size:24px; color:#ff85a2; border-bottom:2px dashed #222; padding-bottom:5px; margin-bottom:10px;">
            Theo tuần</h4>
          <div style="display:flex; justify-content:space-between; font-size:22px;"><span>Đã ăn:</span><span
              style="color:#0f3f26; font-weight:bold;">350.000đ</span></div>
          <div style="display:flex; justify-content:space-between; font-size:22px; margin-top:5px;"><span>Lãng
              phí:</span><span style="color:#ff6b6b; font-weight:bold;">45.000đ</span></div>
        </div>

        <div class="pixel-box" style="padding:15px; margin-bottom:25px;">
          <h4
            style="font-size:24px; color:#ff85a2; border-bottom:2px dashed #222; padding-bottom:5px; margin-bottom:10px;">
            Theo tháng</h4>
          <div style="display:flex; justify-content:space-between; font-size:22px;"><span>Đã ăn:</span><span
              style="color:#0f3f26; font-weight:bold;">1.250.000đ</span></div>
          <div style="display:flex; justify-content:space-between; font-size:22px; margin-top:5px;"><span>Lãng
              phí:</span><span style="color:#ff6b6b; font-weight:bold;">120.000đ</span></div>
        </div>

        <button class="pixel-box-sm"
          style="width:100%; padding:12px; font-family:'VT323'; font-size:22px; cursor:pointer; background:#fff;"
          onclick="closeWalletModal()">Đóng</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    // Fridge hover effect
    const fridgeImg = document.getElementById('fridgeImg');
    fridgeImg.addEventListener('mouseenter', () => {
      fridgeImg.src = '../assets/tulanhmo.gif';
    });
    fridgeImg.addEventListener('mouseleave', () => {
      fridgeImg.src = '../assets/tulanh.png';
    });

    // Camera button → Open Modal & Start Stream
    const camModal = document.getElementById('camModal');
    const video = document.getElementById('camStream');
    const flash = document.getElementById('camFlash');
    let stream = null;

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
      } catch (err) {
        console.error("Lỗi truy cập camera: ", err);
        showToast('❌ Không thể truy cập camera');
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    document.getElementById('camBtnImg').addEventListener('click', () => {
      camModal.classList.add('show');
      startCamera();
    });

    document.getElementById('closeCamBtn').addEventListener('click', () => {
      camModal.classList.remove('show');
      stopCamera();
    });

    document.getElementById('captureBtn').addEventListener('click', () => {
      // Flash effect
      flash.style.display = 'block';
      setTimeout(() => { flash.style.display = 'none'; }, 100);

      showToast('📸 Đang chụp hóa đơn...');

      setTimeout(() => {
        camModal.classList.remove('show');
        stopCamera();
        showToast('✅ Đã lưu hóa đơn!');
      }, 1200);
    });

    // --- LOGIC BẢNG VÍ ---
    function openWalletModal() {
      document.getElementById('walletModalBg').classList.add('open');
    }
    function closeWalletModal() {
      document.getElementById('walletModalBg').classList.remove('open');
    }

    // Đóng các modal (như ví) khi bấm ra nền đen mờ
    window.onclick = function (e) {
      if (e.target.classList.contains('modal-bg')) {
        e.target.classList.remove('open');
      }
    }

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>
</body>

</html>
