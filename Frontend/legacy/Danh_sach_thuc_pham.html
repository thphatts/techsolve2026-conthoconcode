<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Danh Sách Thực Phẩm</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #00e5a0;
      --warn: #fdd835;
      --danger: #ff6b6b;
      --bg: #b8a050;
      --surface: #fdf5c0;
      --card: #fff;
      --border: #222;
      --text: #222;
      --muted: #777;
    }

    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      letter-spacing: 0.5px;
    }

    /* ── Khung điện thoại (Bo tròn hiện đại) ── */
    .phone {
      width: 375px;
      height: 812px;
      background: var(--surface);
      border-radius: 40px;
      border: 8px solid #222;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    /* Status bar */
    .sb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 16px;
      font-weight: 700;
      color: #333;
      position: relative;
      flex-shrink: 0;
      z-index: 60;
    }

    /* Tai thỏ bo tròn */
    .notch {
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0 0 16px 16px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
    }

    /* Header */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 6px;
      flex-shrink: 0;
    }

    .back {
      background: #fff;
      border: 3px solid var(--border);
      color: var(--text);
      border-radius: 0;
      padding: 6px 14px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'VT323', monospace;
      text-decoration: none;
      box-shadow: 2px 2px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .back:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--border);
    }

    .hdr h1 {
      font-size: 26px;
      font-weight: 900;
      flex: 1;
      text-align: center;
    }

    .hdr h1 span {
      color: #ff85a2;
    }

    .fridge-header-img {
      width: 35px;
      height: 45px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
    }

    /* ── Stats row Pixel ── */
    .stats {
      display: flex;
      gap: 10px;
      padding: 6px 14px;
      flex-shrink: 0;
    }

    .sc {
      flex: 1;
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      box-shadow: 4px 4px 0 var(--border);
    }

    .sc .si {
      font-size: 20px;
      display: flex;
      align-items: center;
      margin-bottom: 2px;
    }

    .sc .sv {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .sc .sl {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .sc.g .sv {
      color: #4ade80;
    }

    .sc.y .sv {
      color: var(--warn);
    }

    .sc.r .sv {
      color: var(--danger);
    }

    /* ── Search bar Pixel ── */
    .search {
      margin: 10px 14px;
      padding: 8px 14px;
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      box-shadow: 4px 4px 0 var(--border);
    }

    .search span {
      display: flex;
      align-items: center;
      font-size: 20px;
    }

    .search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 20px;
      font-family: 'VT323', monospace;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    /* ── Filter tabs Pixel ── */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 4px 14px 12px;
      overflow-x: auto;
      flex-shrink: 0;
      cursor: grab;
    }

    .tabs:active {
      cursor: grabbing;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 0;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      border: 3px solid var(--border);
      background: var(--card);
      color: var(--muted);
      box-shadow: 2px 2px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
      user-select: none;
    }

    .tab:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--border);
    }

    .tab.active {
      background: #ff85a2;
      color: #fff;
      border-color: var(--border);
    }

    /* ── Food list Pixel ── */
    .food-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .food-list::-webkit-scrollbar {
      width: 0px;
    }

    .fi {
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
      margin-bottom: 2px;
    }

    .fi:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }

    .fi.warn-item {
      border-left: 8px solid var(--warn);
    }

    .fi.danger-item {
      border-left: 8px solid var(--danger);
    }

    .fi.ok-item {
      border-left: 8px solid #4ade80;
    }

    .ficon {
      width: 52px;
      height: 52px;
      border-radius: 0;
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      background: #fff;
    }

    /* Tô màu nền ô icon theo tình trạng thực phẩm */
    .fi.ok-item .ficon {
      background: #bbf7d0;
    }

    .fi.warn-item .ficon {
      background: #fef08a;
    }

    .fi.danger-item .ficon {
      background: #fecaca;
    }

    .finfo {
      flex: 1;
    }

    .fname {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .fmeta {
      font-size: 16px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fmeta img {
      width: 16px;
      height: 16px;
      image-rendering: pixelated;
    }

    .fbadge {
      padding: 6px 10px;
      border-radius: 0;
      border: 3px solid var(--border);
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ok {
      background: #0f3f26;
      color: #4ade80;
    }

    .wn {
      background: #422a00;
      color: #fdd835;
    }

    .dn {
      background: #4a0f0f;
      color: #ff6b6b;
    }

    /* Khung màu nền báo thời gian */
    .days {
      display: inline-block;
      font-size: 14px;
      font-weight: 700;
      margin-top: 6px;
      padding: 2px 8px;
      color: #fff;
    }

    .days.ok {
      background: #0f3f26;
      color: #4ade80;
    }

    .days.warn {
      background: #fff0b3;
      color: #b28900;
    }

    .days.danger {
      background: #4a0f0f;
      color: #ff6b6b;
    }

    /* ── Add button Pixel ── */
    .add-btn {
      margin: 4px 14px 10px;
      padding: 12px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'VT323', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 4px 4px 0 var(--border);
      transition: transform .1s, box-shadow 0.1s;
      flex-shrink: 0;
    }

    .add-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }

    /* ── Bottom nav Pixel ── */
    .bnav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 10px 24px;
      background: #fff;
      border-top: 4px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    .nav-img-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .nav-img-row img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
    }

    .nav-img-row img.center-btn {
      width: 60px;
      height: 60px;
      margin-top: -15px;
    }

    /* ── Modals ── */
    .modal-wallet-bg {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 3000;
      align-items: flex-end;
    }

    .modal-wallet-bg.open {
      display: flex;
    }

    .modal-wallet-content {
      width: 100%;
      background: #fff;
      border-top: 4px solid #222;
      padding: 24px 20px 40px;
      z-index: 3001;
    }

    .pixel-box {
      border-radius: 0 !important;
      border: 3px solid #222 !important;
      background: #fff;
      box-shadow: 4px 4px 0 #222;
    }

    .pixel-box-sm {
      border-radius: 0 !important;
      border: 3px solid #222 !important;
      box-shadow: 2px 2px 0 #222;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .pixel-box-sm:active {
      transform: translate(2px, 2px) !important;
      box-shadow: 0 0 0 #222 !important;
    }
  </style>
</head>

<body>
  <div class="phone" style="position:relative;">

    <div class="sb">
      <span>10:09</span>
      <div class="notch"></div>
      <span>🔋 87%</span>
    </div>

    <div class="hdr">
      <a href="tu_lanh.html" class="back">← Tủ lạnh</a>
      <img src="../assets/tulanh.png" class="fridge-header-img" id="fridgeHeaderImg" alt="Tủ lạnh"
        onclick="location.href='Index.html'" />
      <h1>Danh sách <span>Thực phẩm</span></h1>
    </div>

    <div class="stats">
      <div class="sc g">
        <span class="si"><img src="../assets/check.png" alt="Còn tốt"
            style="width:24px;height:24px;object-fit:contain;image-rendering:pixelated;" /></span>
        <span class="sv" id="s-good">0</span>
        <span class="sl">Còn tốt</span>
      </div>
      <div class="sc y">
        <span class="si"><img src="../assets/clock.png" alt="Sắp hết"
            style="width:24px;height:24px;object-fit:contain;image-rendering:pixelated;" /></span>
        <span class="sv" id="s-warn">0</span>
        <span class="sl">Sắp hết</span>
      </div>
      <div class="sc r">
        <span class="si"><img src="../assets/siren.png" alt="Hết hạn"
            style="width:24px;height:24px;object-fit:contain;image-rendering:pixelated;" /></span>
        <span class="sv" id="s-danger">0</span>
        <span class="sl">Hết hạn</span>
      </div>
    </div>

    <div class="search">
      <span><img src="../assets/icon_search_pixel.png" alt="🔍" style="width:24px;image-rendering:pixelated;"
          onerror="this.outerHTML='🔍'" /></span>
      <input type="text" id="searchInput" placeholder="Tìm thực phẩm..." oninput="filterFood()" />
    </div>

    <div class="tabs" id="tabsContainer">
      <div class="tab active" onclick="setTab(this,'all')">Tất cả</div>
      <div class="tab" onclick="setTab(this,'ok')">
        <img src="../assets/check.png" alt="Còn tốt"
          style="width:18px;height:18px;object-fit:contain;image-rendering:pixelated;" /> Còn tốt
      </div>
      <div class="tab" onclick="setTab(this,'warn')">
        <img src="../assets/clock.png" alt="Sắp hết"
          style="width:18px;height:18px;object-fit:contain;image-rendering:pixelated;" /> Sắp hết
      </div>
      <div class="tab" onclick="setTab(this,'danger')">
        <img src="../assets/siren.png" alt="Hết hạn"
          style="width:18px;height:18px;object-fit:contain;image-rendering:pixelated;" /> Hết hạn
      </div>
    </div>

    <div class="food-list" id="foodList"></div>

    <button class="add-btn" onclick="location.href='tu_lanh.html'">
      ＋ Thêm thực phẩm mới
    </button>

    <div class="bnav">
      <div class="nav-img-row">
        <img src="../assets/nuttrangchu.png" alt="Trang chủ" onclick="location.href='Index.html'" />
        <img src="../assets/nutthucpham.png" alt="Thực phẩm" onclick="location.href='Danh_sach_thuc_pham.html'" />
        <img src="../assets/nutchup.png" alt="Chụp ảnh" class="center-btn" onclick="location.href='tu_lanh.html'" />
        <img src="../assets/nutvi.png" alt="Ví" onclick="openWalletModal()" />
        <img src="../assets/nutcaidat.png" alt="Cài đặt" />
      </div>
    </div>

    <div class="modal-wallet-bg" id="walletModalBg">
      <div class="modal-wallet-content">
        <h3 style="font-size:30px; margin-bottom: 5px;">Chi tiêu tháng 5...</h3>
        <p style="margin-bottom:20px; font-size:18px; color:#777;">Quản lý thực phẩm</p>
        <div class="pixel-box" style="padding:15px; margin-bottom:20px;">
          <h4
            style="font-size:24px; color:#ff85a2; border-bottom:2px dashed #222; padding-bottom:5px; margin-bottom:10px;">
            Theo tuần</h4>
          <div style="display:flex; justify-content:space-between; font-size:22px;"><span>Đã ăn:</span><span
              style="color:#0f3f26; font-weight:bold;">350.000đ</span></div>
          <div style="display:flex; justify-content:space-between; font-size:22px; margin-top:5px;"><span>Lãng
              phí:</span><span style="color:#ff6b6b; font-weight:bold;">45.000đ</span></div>
        </div>
        <div class="pixel-box" style="padding:15px; margin-bottom:25px;">
          <h4
            style="font-size:24px; color:#ff85a2; border-bottom:2px dashed #222; padding-bottom:5px; margin-bottom:10px;">
            Theo tháng</h4>
          <div style="display:flex; justify-content:space-between; font-size:22px;"><span>Đã ăn:</span><span
              style="color:#0f3f26; font-weight:bold;">1.250.000đ</span></div>
          <div style="display:flex; justify-content:space-between; font-size:22px; margin-top:5px;"><span>Lãng
              phí:</span><span style="color:#ff6b6b; font-weight:bold;">120.000đ</span></div>
        </div>
        <button class="pixel-box-sm"
          style="width:100%; padding:12px; font-family:'VT323'; font-size:22px; cursor:pointer; background:#fff;"
          onclick="closeWalletModal()">Đóng</button>
      </div>
    </div>

  </div>

  <script>
    const foods = [
      { img: 'trung_pixel.png', icon: '🥚', name: 'Trứng gà', qty: '6 quả', exp: '2026-05-12', status: 'ok' },
      { img: 'cachua_pixel.png', icon: '🍅', name: 'Cà chua', qty: '4 quả', exp: '2026-05-10', status: 'warn' },
      { img: 'sua_pixel.png', icon: '🥛', name: 'Sữa tươi', qty: '1 hộp', exp: '2026-05-09', status: 'danger' },
      { img: 'bongcai_pixel.png', icon: '🥦', name: 'Bông cải xanh', qty: '1 cây', exp: '2026-05-15', status: 'ok' },
      { img: 'phomai_pixel.png', icon: '🧀', name: 'Phô mai', qty: '200g', exp: '2026-05-11', status: 'warn' },
      { img: 'ga_pixel.png', icon: '🍗', name: 'Thịt gà', qty: '500g', exp: '2026-05-13', status: 'ok' },
      { img: 'cahoi_pixel.png', icon: '🐟', name: 'Cá hồi', qty: '300g', exp: '2026-05-10', status: 'warn' },
      { img: 'carot_pixel.png', icon: '🥕', name: 'Cà rốt', qty: '5 củ', exp: '2026-05-18', status: 'ok' },
      { img: 'chanh_pixel.png', icon: '🍋', name: 'Chanh', qty: '4 quả', exp: '2026-05-20', status: 'ok' },
      { img: 'hanhtay_pixel.png', icon: '🧅', name: 'Hành tây', qty: '2 củ', exp: '2026-05-25', status: 'ok' },
    ];

    let currentTab = 'all';
    let searchQ = '';

    function daysLeft(exp) {
      const d = Math.round((new Date(exp) - new Date()) / (1000 * 60 * 60 * 24));
      return d;
    }

    function statusLabel(s) {
      if (s === 'ok') return 'Còn tốt';
      if (s === 'warn') return 'Sắp hết hạn';
      return 'Hết hạn!';
    }

    function updateStats() {
      let good = 0, warn = 0, danger = 0;
      foods.forEach(f => {
        if (f.status === 'ok') good++;
        else if (f.status === 'warn') warn++;
        else if (f.status === 'danger') danger++;
      });
      document.getElementById('s-good').textContent = good;
      document.getElementById('s-warn').textContent = warn;
      document.getElementById('s-danger').textContent = danger;
    }

    function renderList() {
      const list = document.getElementById('foodList');
      let data = foods.filter(f => {
        if (currentTab !== 'all' && f.status !== currentTab) return false;
        if (searchQ && !f.name.toLowerCase().includes(searchQ.toLowerCase())) return false;
        return true;
      });

      if (data.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;font-size:18px;">Không tìm thấy thực phẩm nào 🐱</div>';
        return;
      }

      list.innerHTML = data.map(f => {
        const d = daysLeft(f.exp);
        const dText = d < 0 ? `Đã hết hạn ${Math.abs(d)} ngày` : d === 0 ? 'Hôm nay hết hạn!' : `Còn ${d} ngày`;
        const dcls = f.status;
        const expFmt = new Date(f.exp).toLocaleDateString('vi-VN');

        const borderClass = f.status === 'ok' ? 'ok-item' : (f.status === 'warn' ? 'warn-item' : 'danger-item');
        const badgeClass = f.status === 'ok' ? 'ok' : (f.status === 'warn' ? 'wn' : 'dn');

        // Đối với ảnh đồ ăn mình vẫn để chế độ chống lỗi để bạn dễ nhìn
        const imgTag = `<img src="../assets/${f.img}" alt="${f.icon}" style="width:40px;height:40px;object-fit:contain;image-rendering:pixelated;" onerror="this.outerHTML='${f.icon}'" />`;

        const boxIcon = `<img src="../assets/icon_box_pixel.png" alt="📦" onerror="this.outerHTML='📦'" />`;
        const calendarIcon = `<img src="../assets/icon_calendar_pixel.png" alt="📅" onerror="this.outerHTML='📅'" />`;

        return `<div class="fi ${borderClass}">
      <div class="ficon">${imgTag}</div>
      <div class="finfo">
        <div class="fname">${f.name}</div>
        <div class="fmeta">
          <span>${boxIcon} ${f.qty}</span>
          <span>${calendarIcon} HH: ${expFmt}</span>
        </div>
        <div class="days ${dcls}">${dText}</div>
      </div>
      <span class="fbadge ${badgeClass}">${statusLabel(f.status)}</span>
    </div>`;
      }).join('');
    }

    function setTab(el, tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTab = tab;
      renderList();
    }

    function filterFood() {
      searchQ = document.getElementById('searchInput').value;
      renderList();
    }

    function openWalletModal() {
      document.getElementById('walletModalBg').classList.add('open');
    }
    function closeWalletModal() {
      document.getElementById('walletModalBg').classList.remove('open');
    }

    const fridgeHeader = document.getElementById('fridgeHeaderImg');
    if (fridgeHeader) {
      fridgeHeader.addEventListener('mouseenter', () => {
        fridgeHeader.src = '../assets/tulanhmo.gif';
      });
      fridgeHeader.addEventListener('mouseleave', () => {
        fridgeHeader.src = '../assets/tulanh.png';
      });
    }

    document.getElementById('walletModalBg').addEventListener('click', function (e) {
      if (e.target === this) closeWalletModal();
    });

    const tabsContainer = document.getElementById('tabsContainer');
    let isDown = false;
    let startX;
    let scrollLeft;

    tabsContainer.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - tabsContainer.offsetLeft;
      scrollLeft = tabsContainer.scrollLeft;
    });
    tabsContainer.addEventListener('mouseleave', () => {
      isDown = false;
    });
    tabsContainer.addEventListener('mouseup', () => {
      isDown = false;
    });
    tabsContainer.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - tabsContainer.offsetLeft;
      const walk = (x - startX) * 2;
      tabsContainer.scrollLeft = scrollLeft - walk;
    });

    updateStats();
    renderList();
  </script>
</body>

</html>
