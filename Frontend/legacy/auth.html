<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xác thực – Smart Fridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #e67e22;
      --bg: #b8a050;
      --surface: #fdf5c0;
      --text: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .phone {
      width: 375px; height: 720px;
      background: var(--surface);
      border-radius: 40px; border: 8px solid #222;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .content { padding: 40px 25px; display: flex; flex-direction: column; height: 100%; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 28px; font-weight: 900; }
    .header span { color: var(--accent); }
    
    .auth-tabs { display: flex; margin-bottom: 30px; background: #eee; border-radius: 12px; padding: 5px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 800; border-radius: 8px; transition: .2s; }
    .tab.active { background: white; color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 5px; color: #555; }
    input {
      width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px;
      font-family: 'Nunito', sans-serif; font-size: 15px; outline: none; transition: .2s;
    }
    input:focus { border-color: var(--accent); }

    .btn-submit {
      width: 100%; padding: 15px; background: var(--accent); color: white;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 900;
      cursor: pointer; margin-top: 20px; box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3);
    }
    .btn-submit:active { transform: scale(0.98); }

    .toast {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
      border-radius: 25px; font-size: 13px; opacity: 0; transition: .3s; pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="content">
      <div class="header">
        <h1>Smart<span>Fridge</span></h1>
        <p style="font-size: 14px; color: #777;">Quản lý thực phẩm thông minh</p>
      </div>

      <div class="auth-tabs">
        <div class="tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</div>
        <div class="tab" id="tabSignup" onclick="switchTab('signup')">Đăng ký</div>
      </div>

      <form id="authForm">
        <div class="form-group" id="nameGroup" style="display: none;">
          <label>Họ và tên</label>
          <input type="text" id="name" placeholder="Nguyễn Văn A" />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="example@gmail.com" required />
        </div>

        <div class="form-group">
          <label>Mật khẩu</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn-submit" id="btnText">Đăng nhập ngay</button>
      </form>
    </div>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    let mode = 'login';
    const API_BASE = "https://ashes-choosing-nursing.ngrok-free.dev/api/v1/auth"; // Khớp với AuthController backend

    function switchTab(newMode) {
      mode = newMode;
      document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
      document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
      document.getElementById('nameGroup').style.display = mode === 'signup' ? 'block' : 'none';
      document.getElementById('btnText').textContent = mode === 'login' ? 'Đăng nhập ngay' : 'Tạo tài khoản';
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const name = document.getElementById('name').value;

      const endpoint = mode === 'login' ? '/login' : '/signup';
      const body = mode === 'login' 
        ? { email, password } 
        : { name, email, password };

      try {
        const response = await fetch(API_BASE + endpoint, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'ngrok-skip-browser-warning': '69420'
          },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (response.ok) {
          showToast(mode === 'login' ? "✅ Đăng nhập thành công!" : "✅ Đăng ký thành công!");
          
          // Lưu JWT Token và thông tin cần thiết vào localStorage
          localStorage.setItem('jwt_token', data.token);
          // localStorage.setItem('userId', data.userId); // Nếu API có trả về
          
          // Nhảy sang trang chính của dự án sau 1 giây
          setTimeout(() => {
            window.location.href = 'Index.html'; 
          }, 1000);
        } else {
          showToast("❌ " + (data.message || "Có lỗi xảy ra"));
        }
      } catch (err) {
        showToast("❌ Lỗi kết nối Server!");
      }
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.opacity = '1';
      setTimeout(() => t.style.opacity = '0', 2500);
    }
  </script>
</body>
</html>
