<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Foods List – Smart Fridge</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'VT323', monospace;
      background: #b8a050;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Phone shell ── */
    .phone {
      width: 375px;
      height: 720px;
      border: 8px solid #222;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: #fff;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      height: 110px;
      background: #F8F9CA;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 2px solid #DDE0A0;
      flex-shrink: 0;
    }

    .title-badge {
      background: #E4E7A8;
      padding: 6px 28px;
      border-radius: 10px;
      font-size: 34px;
      color: #111;
      letter-spacing: 1px;
    }

    .add-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      background: transparent;
      border: none;
      gap: 3px;
    }
    .add-btn img {
      width: 40px; height: 40px;
      image-rendering: pixelated;
      background: #EAEBBE;
      border-radius: 8px;
      padding: 5px;
    }
    .add-btn span { font-size: 13px; color: #333; }

    /* ── Content ── */
    .content {
      flex: 1;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      background: #f5fbff;
    }
    .content::-webkit-scrollbar { display: none; }

    .date { font-size: 22px; color: #222; }

    .note-area {
      width: 100%;
      height: 44px;
      background: #B2D3C2;
      border-radius: 8px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-size: 22px;
      color: #333;
      flex-shrink: 0;
    }

    /* ── Food list ── */
    .food-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .food-row {
      background: #E6ECEF;
      border-radius: 10px;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
      animation: fadeSlideIn 0.3s ease both;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .food-icon { font-size: 26px; line-height: 1; }

    .food-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .food-name {
      font-size: 24px;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .food-meta {
      font-family: 'Nunito', sans-serif;
      font-size: 10px;
      color: #888;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .edit-icon {
      width: 22px; height: 22px;
      image-rendering: pixelated;
      opacity: 0.55;
      cursor: pointer;
      flex-shrink: 0;
    }
    .edit-icon:hover { opacity: 0.9; }

    .empty-row {
      background: #E6ECEF;
      border-radius: 10px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 14px;
      opacity: 0.75;
    }

    /* ── Empty state (khi AI không tìm thấy gì) ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 30px 0;
      color: #aaa;
    }
    .empty-state-icon { font-size: 48px; }
    .empty-state-text { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; text-align: center; }

    /* ── Toast ── */
    .toast {
      position: absolute;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0,0,0,0.8);
      color: #fff; padding: 10px 22px;
      border-radius: 25px; font-size: 14px; font-weight: 700;
      font-family: 'Nunito', sans-serif;
      opacity: 0; transition: all 0.3s;
      z-index: 100; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>
  <div class="phone">
    <header class="header">
      <div class="title-badge">Foods List</div>
      <button class="add-btn" id="saveToFridgeBtn">
        <img src="../assets/Food-list/exits.png" alt="Add to Fridge" />
        <span>Add to Fridge</span>
      </button>
    </header>

    <div class="content">
      <div class="date" id="dateDisplay">Day: --/--/----</div>

      <div class="note-area">Type note:</div>

      <div class="food-items" id="foodItemsList">
        <!-- Render bởi JS -->
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    //  Map tên sản phẩm → Emoji icon
    // ============================================================
    const EMOJI_MAP = [
      { keys: ['cà chua', 'tomato'],              emoji: '🍅' },
      { keys: ['thịt bò', 'bò', 'beef'],          emoji: '🥩' },
      { keys: ['thịt gà', 'gà', 'chicken'],       emoji: '🍗' },
      { keys: ['thịt heo', 'heo', 'pork'],        emoji: '🥓' },
      { keys: ['cá', 'fish'],                      emoji: '🐟' },
      { keys: ['sữa', 'milk'],                     emoji: '🥛' },
      { keys: ['trứng', 'egg'],                    emoji: '🥚' },
      { keys: ['rau', 'cải', 'salad', 'lettuce'], emoji: '🥬' },
      { keys: ['táo', 'apple'],                    emoji: '🍎' },
      { keys: ['chuối', 'banana'],                 emoji: '🍌' },
      { keys: ['cam', 'orange'],                   emoji: '🍊' },
      { keys: ['xoài', 'mango'],                   emoji: '🥭' },
      { keys: ['nước', 'water', 'drink'],          emoji: '🥤' },
      { keys: ['phô mai', 'cheese'],               emoji: '🧀' },
      { keys: ['bơ', 'butter'],                    emoji: '🧈' },
      { keys: ['bánh', 'bread'],                   emoji: '🍞' },
      { keys: ['mì', 'noodle', 'pasta'],           emoji: '🍜' },
      { keys: ['tỏi', 'garlic'],                   emoji: '🧄' },
      { keys: ['hành', 'onion'],                   emoji: '🧅' },
      { keys: ['cà rốt', 'carrot'],                emoji: '🥕' },
      { keys: ['ớt', 'pepper'],                    emoji: '🌶️' },
      { keys: ['dưa', 'cucumber', 'melon'],        emoji: '🍉' },
    ];

    function getEmoji(name) {
      const n = (name || '').toLowerCase();
      for (const { keys, emoji } of EMOJI_MAP) {
        if (keys.some(k => n.includes(k))) return emoji;
      }
      return '🍱';
    }

    // ============================================================
    //  Format ngày hết hạn từ số ngày
    // ============================================================
    function calcExpiry(days) {
      if (!days) return null;
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
    }

    // ============================================================
    //  Render danh sách
    // ============================================================
    function renderItems(items) {
      const list = document.getElementById('foodItemsList');
      list.innerHTML = '';

      if (!items || items.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">AI không nhận diện được sản phẩm nào.<br/>Hãy thử chụp lại với ánh sáng tốt hơn.</div>
          </div>`;
        return;
      }

      // Render các item thật từ AI
      items.forEach((item, i) => {
        const expiry   = calcExpiry(item.estimated_expiry_days);
        const qty      = item.quantity    ? `x${item.quantity}` : '';
        const cat      = item.category    ? `[${item.category}]` : '';
        const meta     = [qty, expiry ? `HSD: ${expiry}` : '', cat].filter(Boolean).join(' · ');

        const row = document.createElement('div');
        row.className = 'food-row';
        row.style.animationDelay = `${i * 60}ms`;
        row.innerHTML = `
          <div class="food-icon">${getEmoji(item.product_name)}</div>
          <div class="food-info">
            <div class="food-name">${item.product_name || '(Không tên)'}</div>
            ${meta ? `<div class="food-meta">${meta}</div>` : ''}
          </div>
          <img src="../assets/Food-list/edit.png" alt="Edit" class="edit-icon" />
        `;
        list.appendChild(row);
      });

      // Điền thêm ô trống cho đẹp (tối đa 7 slots)
      const TOTAL_SLOTS = 7;
      const emptyCount = Math.max(0, TOTAL_SLOTS - items.length);
      for (let i = 0; i < emptyCount; i++) {
        const empty = document.createElement('div');
        empty.className = 'empty-row';
        empty.innerHTML = `<img src="../assets/Food-list/edit.png" alt="" class="edit-icon" />`;
        list.appendChild(empty);
      }
    }

    // ============================================================
    //  Init
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
      // Ngày hôm nay
      const now = new Date();
      document.getElementById('dateDisplay').textContent =
        `Day: ${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;

      // Đọc dữ liệu AI từ sessionStorage (được lưu bởi camera.html)
      let items = [];
      try {
        const raw = sessionStorage.getItem('scannedItems');
        if (raw) items = JSON.parse(raw);
      } catch (e) {
        console.error('Parse scannedItems error:', e);
      }

      renderItems(items);

      // BUG-8 fix: Nút "Add to Fridge" → toast + navigate thật sự
      document.getElementById('saveToFridgeBtn').addEventListener('click', () => {
        sessionStorage.removeItem('scannedItems');
        showToast('🎉 Đã thêm vào tủ lạnh!');
        setTimeout(() => { window.location.href = 'tu_lanh.html'; }, 900);
      });
    });

    function showToast(msg, duration = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), duration);
    }
  </script>
</body>
</html>
