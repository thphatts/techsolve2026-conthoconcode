<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Danh Sách Thực Phẩm</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #00e5a0;
      --warn: #fdd835;
      --danger: #ff6b6b;
      --bg: #b8a050;
      --surface: #fdf5c0;
      --card: #fff;
      --border: #222;
      --text: #222;
      --muted: #777;
    }

    body {
      font-family: 'VT323', monospace;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      letter-spacing: 0.5px;
    }

    /* ── Phone shell Pixel ── */
    .phone {
      width: 375px;
      height: 812px;
      background: var(--surface);
      border-radius: 0;
      border: 4px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
      position: relative;
    }

    /* Status bar */
    .sb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 16px;
      font-weight: 700;
      color: #333;
      position: relative;
      flex-shrink: 0;
      background: transparent;
    }

    .notch {
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Header */
    .hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px 6px;
      flex-shrink: 0;
    }

    /* Nút Back Pixel */
    .back {
      background: #fff;
      border: 3px solid var(--border);
      color: var(--text);
      border-radius: 0;
      padding: 6px 14px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'VT323', monospace;
      text-decoration: none;
      box-shadow: 2px 2px 0 var(--border);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .back:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--border);
    }

    .hdr h1 {
      font-size: 24px;
      font-weight: 900;
      flex: 1;
      text-align: center;
    }

    .hdr h1 span {
      color: #ff85a2;
    }

    .fridge-header-img {
      width: 35px;
      height: 45px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
    }

    /* ── Stats row Pixel ── */
    .stats {
      display: flex;
      gap: 10px;
      padding: 6px 14px;
      flex-shrink: 0;
    }

    .sc {
      flex: 1;
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      box-shadow: 4px 4px 0 var(--border);
    }

    .sc .si {
      font-size: 20px;
    }

    .sc .sv {
      font-size: 24px;
      font-weight: 900;
    }

    .sc .sl {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .sc.g .sv {
      color: #4ade80;
    }

    .sc.y .sv {
      color: var(--warn);
    }

    .sc.r .sv {
      color: var(--danger);
    }

    /* ── Search bar Pixel ── */
    .search {
      margin: 10px 14px;
      padding: 8px 14px;
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      box-shadow: 4px 4px 0 var(--border);
    }

    .search span {
      font-size: 20px;
    }

    .search input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 20px;
      font-family: 'VT323', monospace;
    }

    .search input::placeholder {
      color: var(--muted);
    }

    /* ── Filter tabs Pixel ── */
    .tabs {
      display: flex;
      gap: 10px;
      padding: 4px 14px 12px;
      overflow-x: auto;
      flex-shrink: 0;
      /* Thêm con trỏ chuột hình bàn tay để báo hiệu kéo được */
      cursor: grab;
    }

    /* Đổi hình bàn tay khi đang nhấn giữ */
    .tabs:active {
      cursor: grabbing;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 0;
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      border: 3px solid var(--border);
      background: var(--card);
      color: var(--muted);
      box-shadow: 2px 2px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
      /* Ngăn chặn bôi đen text khi kéo chuột */
      user-select: none;
    }

    .tab:active {
      transform: translate(2px, 2px);
      box-shadow: 0 0 0 var(--border);
    }

    .tab.active {
      background: #ff85a2;
      color: #fff;
      border-color: var(--border);
    }

    /* ── Food list Pixel ── */
    .food-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .food-list::-webkit-scrollbar {
      width: 0px;
    }

    .fi {
      background: var(--card);
      border: 3px solid var(--border);
      border-radius: 0;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
      margin-bottom: 2px;
    }

    .fi:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }

    .fi.warn-item {
      border-left: 8px solid var(--warn);
    }

    .fi.danger-item {
      border-left: 8px solid var(--danger);
    }

    .fi.ok-item {
      border-left: 8px solid #4ade80;
    }

    .ficon {
      width: 48px;
      height: 48px;
      border-radius: 0;
      border: 3px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      background: #222;
    }

    .finfo {
      flex: 1;
    }

    .fname {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .fmeta {
      font-size: 16px;
      color: var(--muted);
      margin-top: 4px;
    }

    .fmeta span {
      margin-right: 8px;
    }

    .fbadge {
      padding: 6px 10px;
      border-radius: 0;
      border: 3px solid var(--border);
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ok {
      background: #0f3f26;
      color: #4ade80;
    }

    .wn {
      background: #422a00;
      color: #fdd835;
    }

    .dn {
      background: #4a0f0f;
      color: #ff6b6b;
    }

    .days {
      font-size: 15px;
      font-weight: 700;
      margin-top: 4px;
    }

    .days.ok {
      color: #4ade80;
    }

    .days.warn {
      color: var(--warn);
    }

    .days.danger {
      color: var(--danger);
    }

    /* ── Add button Pixel ── */
    .add-btn {
      margin: 4px 14px 10px;
      padding: 12px;
      background: #fff;
      border: 3px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'VT323', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 4px 4px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
      flex-shrink: 0;
    }

    .add-btn:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }

    /* ── Bottom nav Pixel ── */
    .bnav {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 10px 24px;
      background: #fff;
      border-top: 4px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    .nav-img-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .nav-img-row img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
    }

    .nav-img-row img.center-btn {
      width: 60px;
      height: 60px;
      margin-top: -15px;
    }

    /* ── Modal thêm món Pixel ── */
    .modal-bg {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      align-items: flex-end;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal {
      width: 100%;
      background: var(--card);
      border-radius: 0;
      padding: 24px 18px 40px;
      border-top: 4px solid var(--border);
    }

    .modal h3 {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .modal input,
    .modal select {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      background: var(--surface);
      border: 3px solid var(--border);
      border-radius: 0;
      color: var(--text);
      font-size: 20px;
      font-family: 'VT323', monospace;
      outline: none;
      box-shadow: inset 2px 2px 0 rgba(0, 0, 0, 0.1);
    }

    .modal-btns {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .modal-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 0;
      border: 3px solid var(--border);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'VT323', monospace;
      box-shadow: 4px 4px 0 var(--border);
      transition: transform .1s, box-shadow .1s;
    }

    .modal-btns button:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--border);
    }

    .btn-cancel {
      background: #fff;
      color: var(--text);
    }

    .btn-save {
      background: var(--cyan);
      color: #000;
    }
  </style>
</head>

<body>
  <div class="phone" style="position:relative;">

    <div class="sb">
      <span>10:09</span>
      <div class="notch"></div>
      <span>🔋 87%</span>
    </div>

    <div class="hdr">
      <a href="tu_lanh.html" class="back">← Tủ lạnh</a>
      <img src="../assets/tulanh.png" class="fridge-header-img" id="fridgeHeaderImg" alt="Tủ lạnh"
        onclick="location.href='Index.html'" />
      <h1>Smart<span>Fridge</span></h1>
    </div>

    <div class="stats">
      <div class="sc g"><span class="si">✅</span><span class="sv" id="s-good">0</span><span class="sl">Còn tốt</span>
      </div>
      <div class="sc y"><span class="si">⏰</span><span class="sv" id="s-warn">0</span><span class="sl">Sắp hết</span>
      </div>
      <div class="sc r"><span class="si">🚨</span><span class="sv" id="s-danger">0</span><span class="sl">Hết hạn</span>
      </div>
    </div>

    <div class="search">
      <span>🔍</span>
      <input type="text" id="searchInput" placeholder="Tìm thực phẩm..." oninput="filterFood()" />
    </div>

    <div class="tabs" id="tabsContainer">
      <div class="tab active" onclick="setTab(this,'all')">Tất cả</div>
      <div class="tab" onclick="setTab(this,'ok')">✅ Còn tốt</div>
      <div class="tab" onclick="setTab(this,'warn')">⚠️ Sắp hết</div>
      <div class="tab" onclick="setTab(this,'danger')">🚨 Hết hạn</div>
    </div>

    <div class="food-list" id="foodList"></div>

    <button class="add-btn" onclick="openModal()">
      ＋ Thêm thực phẩm mới
    </button>

    <div class="bnav">
      <div class="nav-img-row">
        <img src="../assets/nuttrangchu.png" alt="Trang chủ" onclick="location.href='Index.html'" />
        <img src="../assets/nutthucpham.png" alt="Thực phẩm" onclick="location.href='Danh_sach_thuc_pham.html'" />
        <img src="../assets/nutchup.png" alt="Chụp ảnh" class="center-btn" onclick="location.href='tu_lanh.html'" />
        <img src="../assets/nutvi.png" alt="Ví" />
        <img src="../assets/nutcaidat.png" alt="Cài đặt" />
      </div>
    </div>

    <div class="modal-bg" id="modalBg">
      <div class="modal">
        <h3>➕ Thêm thực phẩm</h3>
        <input type="text" id="mName" placeholder="Tên thực phẩm (vd: Cà rốt 🥕)" />
        <input type="text" id="mQty" placeholder="Số lượng (vd: 3 củ)" />
        <input type="date" id="mExp" />
        <div class="modal-btns">
          <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
          <button class="btn-save" onclick="addFood()">Lưu</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── Data ──────────────────────────────
    const defaultFoods = [
      { icon: '🥚', name: 'Trứng gà', qty: 6, unit: 'quả', exp: '2026-05-12' },
      { icon: '🍅', name: 'Cà chua', qty: 4, unit: 'quả', exp: '2026-05-10' },
      { icon: '🥛', name: 'Sữa tươi', qty: 1, unit: 'hộp', exp: '2026-05-09' },
      { icon: '🥦', name: 'Bông cải xanh', qty: 1, unit: 'cây', exp: '2026-05-15' },
      { icon: '🧀', name: 'Phô mai', qty: 200, unit: 'g', exp: '2026-05-11' },
      { icon: '🍗', name: 'Thịt gà', qty: 500, unit: 'g', exp: '2026-05-13' },
      { icon: '🐟', name: 'Cá hồi', qty: 300, unit: 'g', exp: '2026-05-10' },
      { icon: '🥕', name: 'Cà rốt', qty: 5, unit: 'củ', exp: '2026-05-18' },
      { icon: '🍋', name: 'Chanh', qty: 4, unit: 'quả', exp: '2026-05-20' },
      { icon: '🧅', name: 'Hành tây', qty: 2, unit: 'củ', exp: '2026-05-25' },
    ];

    let foods = [];
    try {
      const stored = localStorage.getItem('fridgeItems');
      if (stored) foods = JSON.parse(stored);
      else foods = defaultFoods; // Fallback
    } catch(e) { foods = defaultFoods; }

    function saveFoods() {
      localStorage.setItem('fridgeItems', JSON.stringify(foods));
    }

    let currentTab = 'all';
    let searchQ = '';

    function daysLeft(exp) {
      const d = Math.round((new Date(exp) - new Date()) / (1000 * 60 * 60 * 24));
      return d;
    }
    function statusLabel(s) {
      if (s === 'ok') return 'Còn tốt';
      if (s === 'warn') return 'Sắp hết hạn';
      return 'Hết hạn!';
    }

    function updateStats() {
      let good = 0, warn = 0, danger = 0;
      foods.forEach(f => {
        const d = daysLeft(f.exp);
        const status = d < 0 ? 'danger' : d <= 3 ? 'warn' : 'ok';
        if (status === 'ok') good++;
        else if (status === 'warn') warn++;
        else if (status === 'danger') danger++;
      });
      document.getElementById('s-good').textContent = good;
      document.getElementById('s-warn').textContent = warn;
      document.getElementById('s-danger').textContent = danger;
    }

    function renderList() {
      const list = document.getElementById('foodList');
      let data = foods.filter(f => {
        const d = daysLeft(f.exp);
        const status = d < 0 ? 'danger' : d <= 3 ? 'warn' : 'ok';
        if (currentTab !== 'all' && status !== currentTab) return false;
        if (searchQ && !f.name.toLowerCase().includes(searchQ.toLowerCase())) return false;
        return true;
      });

      if (data.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:30px;font-size:18px;">Không tìm thấy thực phẩm nào 🐱</div>';
        return;
      }

      list.innerHTML = data.map(f => {
        const d = daysLeft(f.exp);
        const dText = d < 0 ? `Đã hết hạn ${Math.abs(d)} ngày` : d === 0 ? 'Hôm nay hết hạn!' : `Còn ${d} ngày`;
        const status = d < 0 ? 'danger' : d <= 3 ? 'warn' : 'ok';
        const dcls = status;
        const expFmt = new Date(f.exp).toLocaleDateString('vi-VN');

        const borderClass = status === 'ok' ? 'ok-item' : (status === 'warn' ? 'warn-item' : 'danger-item');
        const badgeClass = status === 'ok' ? 'ok' : (status === 'warn' ? 'wn' : 'dn');

        return `<div class="fi ${borderClass}">
      <div class="ficon">${f.icon}</div>
      <div class="finfo">
        <div class="fname">${f.name}</div>
        <div class="fmeta">
          <span>📦 ${f.qty} ${f.unit}</span>
          <span>📅 HH: ${expFmt}</span>
        </div>
        <div class="days ${dcls}">${dText}</div>
      </div>
      <span class="fbadge ${badgeClass}">${statusLabel(status)}</span>
    </div>`;
      }).join('');
    }

    function setTab(el, tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTab = tab;
      renderList();
    }

    function filterFood() {
      searchQ = document.getElementById('searchInput').value;
      renderList();
    }

    function openModal() {
      document.getElementById('modalBg').classList.add('open');
      const d = new Date(); d.setDate(d.getDate() + 7);
      document.getElementById('mExp').value = d.toISOString().split('T')[0];
    }

    function closeModal() {
      document.getElementById('modalBg').classList.remove('open');
    }

    function addFood() {
      const name = document.getElementById('mName').value.trim();
      const qtyInput = document.getElementById('mQty').value.trim();
      const exp = document.getElementById('mExp').value;
      if (!name || !qtyInput || !exp) { alert('Vui lòng điền đầy đủ thông tin!'); return; }
      
      const qty = parseInt(qtyInput) || 1;
      const unit = qtyInput.replace(/[0-9]/g, '').trim() || 'món';

      foods.unshift({ icon: '🍱', name, qty, unit, exp });
      saveFoods(); // Cập nhật localStorage
      closeModal();
      renderList();
      updateStats();

      document.getElementById('mName').value = '';
      document.getElementById('mQty').value = '';
    }

    // Hover tủ lạnh ở Header
    const fridgeHeader = document.getElementById('fridgeHeaderImg');
    if (fridgeHeader) {
      fridgeHeader.addEventListener('mouseenter', () => {
        fridgeHeader.src = '../assets/tulanhmo.gif';
      });
      fridgeHeader.addEventListener('mouseleave', () => {
        fridgeHeader.src = '../assets/tulanh.png';
      });
    }

    // Lắng nghe click ra ngoài modal để đóng
    document.getElementById('modalBg').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // ── XỬ LÝ KÉO TRƯỢT CHUỘT CHO TABS ──
    const tabsContainer = document.getElementById('tabsContainer');
    let isDown = false;
    let startX;
    let scrollLeft;

    tabsContainer.addEventListener('mousedown', (e) => {
      isDown = true;
      startX = e.pageX - tabsContainer.offsetLeft;
      scrollLeft = tabsContainer.scrollLeft;
    });
    tabsContainer.addEventListener('mouseleave', () => {
      isDown = false;
    });
    tabsContainer.addEventListener('mouseup', () => {
      isDown = false;
    });
    tabsContainer.addEventListener('mousemove', (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - tabsContainer.offsetLeft;
      const walk = (x - startX) * 2; // Tốc độ trượt (nhân 2 để lướt nhanh hơn)
      tabsContainer.scrollLeft = scrollLeft - walk;
    });

    // Initial render
    updateStats();
    renderList();
  </script>
</body>

</html>
