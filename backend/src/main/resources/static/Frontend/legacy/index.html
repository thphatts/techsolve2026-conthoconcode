<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Trang Chủ – Smart Fridge</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'VT323', monospace;
      background: #b8a050;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      letter-spacing: 0.5px;
    }

    /* ── Phone shell (Pixel hóa: viền 4px, không bo góc) ── */
    .phone {
      width: 375px;
      height: 812px;
      border: 4px solid #222;
      border-radius: 0;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      background: #fdf5c0;
      box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.2);
    }

    /* ── Status bar ── */
    .sb {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 16px;
      color: #333;
      position: relative;
      flex-shrink: 0;
      background: transparent;
    }

    .sb-notch {
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    .sb-battery {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Icon pin pixel */
    .battery-icon {
      width: 22px;
      height: 12px;
      border: 2px solid #333;
      position: relative;
    }

    .battery-icon::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      background: #333;
    }

    .battery-level {
      height: 100%;
      width: 87%;
      background: #4ade80;
    }

    /* ── ROOM ── */
    .room {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-top: 4px solid #333;
      background: url('../assets/background.png') center 8% / cover no-repeat;
    }

    .fridge-link,
    .cat-area {
      position: absolute;
      z-index: 1;
    }

    /* Tủ lạnh */
    .fridge-link {
      position: absolute;
      left: 10px;
      bottom: 0;
      top: 45px;
      width: 90%;
      z-index: 10;
      text-decoration: none;
      transition: transform 0.2s;
    }

    .fridge-link:hover {
      transform: scale(1.02);
    }

    .fridge-link img {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      display: block;
    }

    /* Mèo area */
    .cat-area {
      position: absolute;
      left: 60px;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      animation: bounce 3s infinite ease-in-out;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .cat-img {
      width: 230px;
      image-rendering: pixelated;
      display: block;
      flex-shrink: 0;
    }

    /* Bong bóng thoại Pixel – vuông vức, bóng đổ cứng */
    .bubble {
      background: #fff;
      border: 4px solid #222;
      border-radius: 0;
      /* Bỏ bo góc */
      padding: 8px 16px;
      font-family: 'VT323', monospace;
      font-size: 26px;
      /* Chữ to chuẩn pixel */
      font-weight: normal;
      color: #111;
      line-height: 1.2;
      text-align: center;
      position: relative;
      margin-bottom: 25px;
      box-shadow: 6px 6px 0 #222;
      /* Bóng đổ nét cứng */
      white-space: nowrap;
      right: -40px;
      top: 10px;
      letter-spacing: 1px;
    }

    /* Đuôi bong bóng dạng góc vuông cứng (Pixel style) */
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 20px;
      border-top: 16px solid #222;
      border-right: 16px solid transparent;
    }

    .bubble::before {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 24px;
      border-top: 10px solid #fff;
      border-right: 10px solid transparent;
      z-index: 1;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: flex;
      background: #fff;
      border-top: 4px solid #222;
      padding: 12px 10px 24px;
      flex-shrink: 0;
    }

    .nav-img-row {
      display: flex;
      justify-content: space-around;
      align-items: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    .nav-img-row img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      image-rendering: pixelated;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .nav-img-row img:active {
      transform: scale(0.9);
    }

    .nav-img-row img.center-btn {
      width: 60px;
      height: 60px;
      margin-top: -15px;
    }

    /* ── Camera Modal ── */
    .cam-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden; /* giữ hidden để bo góc điện thoại hoạt động đúng */
    }

    .cam-modal.show {
      display: flex;
    }

    /* .cam-full-img removed – unused class (BUG-10) */

    #camStream {
      position: absolute; /* Add this */
      top: 0;             /* Add this */
      left: 0;            /* Add this */
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1001;
    }

    .cam-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      z-index: 2000;
      display: none;
    }

    .cam-overlay-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      border: 4px solid #fff;
      border-radius: 0;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 20px;
      font-family: 'VT323', monospace;
      z-index: 1005;
    }

    .cam-capture-btn {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 80px;
      image-rendering: pixelated;
      cursor: pointer;
      z-index: 1005;
      transition: transform 0.1s;
    }

    .cam-capture-btn:active {
      transform: translateX(-50%) scale(0.9);
    }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #000;
      color: #00e5a0;
      border: 4px solid #00e5a0;
      padding: 10px 20px;
      border-radius: 0;
      font-size: 20px;
      font-family: 'VT323', monospace;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 6px 6px 0 rgba(0, 229, 160, 0.3);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Upload btn (trong cam modal) ── */
    .cam-upload-area {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 1005;
    }

    .cam-upload-btn {
      background: rgba(0,0,0,0.55);
      border: 3px solid #fff;
      color: #fff;
      font-family: 'VT323', monospace;
      font-size: 22px;
      padding: 8px 22px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }
    .cam-upload-btn:hover { background: rgba(255,255,255,0.15); }

    .cam-loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 2001;
    }
    .cam-loading.show { display: flex; }
    .cam-spinner {
      width: 48px; height: 48px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: #00e5a0;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cam-loading-text {
      font-size: 20px; color: #00e5a0;
      font-family: 'VT323', monospace;
      letter-spacing: 1px;
      text-align: center;
    }

    /* ── Result panel (slide up từ dưới) ── */
    .result-panel {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      background: #fff;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.3);
      /* Nằm ngoài cam-modal nên chỉ cần cao hơn cam-modal z-index:1000 */
      z-index: 1200;
      display: flex;
      flex-direction: column;
      max-height: 72%;
    }
    .result-panel.open { transform: translateY(0); }

    .panel-handle {
      width: 40px; height: 4px;
      background: #ccc; border-radius: 4px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px 6px;
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 28px; color: #111;
    }
    .panel-count {
      font-family: 'Nunito', sans-serif;
      font-size: 12px; font-weight: 800;
      color: #00aa77;
      background: #e6fff5;
      padding: 3px 10px; border-radius: 20px;
    }

    .panel-list {
      overflow-y: auto;
      padding: 4px 16px 0;
      flex: 1;
    }
    .panel-list::-webkit-scrollbar { display: none; }

    .item-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.3s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .item-row:last-child { border-bottom: none; }
    .item-emoji { font-size: 28px; flex-shrink: 0; }
    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 24px; color: #111;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .item-meta {
      font-family: 'Nunito', sans-serif;
      font-size: 10px; font-weight: 700; color: #999; margin-top: 1px;
    }
    .item-price {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 800;
      background: #f0f8ff; color: #5aaadd;
      padding: 3px 8px; border-radius: 10px;
      flex-shrink: 0;
    }
    .expiry-select {
      font-family: 'Nunito', sans-serif;
      font-size: 11px; font-weight: 700; color: #00aa77;
      background: #e6fff5; border: 1px solid #00aa77;
      border-radius: 4px; padding: 1px 4px; outline: none;
      margin: 0 4px; cursor: pointer;
    }

    .panel-empty {
      text-align: center; padding: 28px 20px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px; color: #aaa; font-weight: 700;
    }
    .panel-empty-icon { font-size: 40px; display: block; margin-bottom: 8px; }

    .panel-footer {
      padding: 12px 16px 20px;
      display: flex; gap: 10px;
      flex-shrink: 0;
      border-top: 1px solid #eee;
    }
    .btn-rescan {
      flex: 1; padding: 12px;
      border: 2px solid #00aa77; border-radius: 12px;
      background: #fff; color: #00aa77;
      font-family: 'VT323', monospace; font-size: 20px;
      cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 12px;
      border: none; border-radius: 12px;
      background: #00aa77; color: #fff;
      font-family: 'VT323', monospace; font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="phone">

    <div class="sb">
      <div class="sb-time">10:09</div>
      <div class="sb-notch"></div>
      <div class="sb-battery">
        <span>🔋</span>
        <span>87%</span>
      </div>
    </div>

    <div class="room">
      <a href="tu_lanh.html" class="fridge-link">
        <img src="../assets/tulanh.png" alt="Tủ lạnh" id="fridgeImg" />
      </a>

      <div class="cat-area">
        <div class="bubble">
          Hôm nay ăn gì nè?
        </div>
        <img src="../assets/meodung.gif" alt="Mèo" class="cat-img" />
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-img-row">
        <img src="../assets/nuttrangchu.png" alt="Trang chủ" onclick="location.href='Index.html'" />
        <img src="../assets/nutthucpham.png" alt="Thực phẩm" onclick="location.href='danh_sach_thuc_pham.html'" />
        <img src="../assets/nutchup.png" alt="Chụp ảnh" id="camBtnImg" class="center-btn" />
        <img src="../assets/nutvi.png" alt="Ví" onclick="location.href='vi.html'" />
        <img src="../assets/nutcaidat.png" alt="Cài đặt" />
      </div>
    </div>

    <div class="cam-modal" id="camModal">
      <video id="camStream" autoplay playsinline></video>
      <div class="cam-flash" id="camFlash"></div>

      <button class="cam-overlay-close" id="closeCamBtn">Đóng</button>

      <!-- Nút chụp ảnh -->
      <img src="../assets/camera.png" class="cam-capture-btn" id="captureBtn" alt="Chụp ảnh">

      <!-- Nút upload ảnh -->
      <div class="cam-upload-area">
        <input type="file" id="uploadFileInput" accept="image/*" style="display:none;" />
        <button class="cam-upload-btn" id="uploadBtn">📁 Upload ảnh từ máy</button>
      </div>

      <!-- Loading overlay (bên trong modal) -->
      <div class="cam-loading" id="camLoading">
        <div class="cam-spinner"></div>
        <div class="cam-loading-text">AI đang phân tích...<br/>Vui lòng chờ</div>
      </div>
    </div>

    <!-- Result Panel ─ Đặt ĐÂY, trong .phone nhưng NGOÀI cam-modal
         → sử dụng position:fixed so với .phone để slide lên trên camera -->
    <div class="result-panel" id="resultPanel">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <span class="panel-title">Foods List</span>
        <span class="panel-count" id="itemCount">0 sản phẩm</span>
      </div>
      <div class="panel-list" id="itemList"></div>
      <div class="panel-footer">
        <button class="btn-rescan" id="rescanBtn">Chụp lại</button>
        <button class="btn-save"   id="saveFridgeBtn">Lưu vào tủ</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    // ─── Config ───
    const BASE_URL    = ""; // thay bằng ngrok URL khi test điện thoại
    const API_RECEIPT = `${BASE_URL}/api/v1/scan/receipt`;

    const EMOJI_MAP = [
      { keys: ['cà chua','tomato'],              emoji: '🍅' },
      { keys: ['thịt bò','bò','beef'],           emoji: '🥩' },
      { keys: ['thịt gà','gà','chicken'],        emoji: '🍗' },
      { keys: ['thịt heo','heo','pork'],          emoji: '🥓' },
      { keys: ['cá','fish'],                       emoji: '🐟' },
      { keys: ['sữa','milk'],                      emoji: '🥛' },
      { keys: ['trứng','egg'],                     emoji: '🥚' },
      { keys: ['rau','cải','salad'],               emoji: '🥬' },
      { keys: ['táo','apple'],                     emoji: '🍎' },
      { keys: ['chuối','banana'],                  emoji: '🍌' },
      { keys: ['cam','orange'],                    emoji: '🍊' },
      { keys: ['xoài','mango'],                    emoji: '🥭' },
      { keys: ['nước','water'],                   emoji: '🥤' },
      { keys: ['phô mai','cheese'],               emoji: '🧀' },
      { keys: ['bơ','butter'],                     emoji: '🧈' }, // BUG-12 fix: 🧨→🧈
      { keys: ['bánh','bread'],                    emoji: '🍞' },
      { keys: ['mì','noodle'],                     emoji: '🍜' },];

    function getEmoji(name) {
      const n = (name || '').toLowerCase();
      for (const { keys, emoji } of EMOJI_MAP) {
        if (keys.some(k => n.includes(k))) return emoji;
      }
      return '';
    }

    function calcExpiry(days) {
      if (!days) return null;
      const d = new Date();
      d.setDate(d.getDate() + days);
      return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
    }

    // ─── Fridge hover ───
    const fridgeImg = document.getElementById('fridgeImg');
    fridgeImg.addEventListener('mouseenter', () => fridgeImg.src = '../assets/tulanhmo.gif');
    fridgeImg.addEventListener('mouseleave', () => fridgeImg.src = '../assets/tulanh.png');

    // ─── Camera refs ───
    const camModal     = document.getElementById('camModal');
    const camStream    = document.getElementById('camStream');
    const flash        = document.getElementById('camFlash');
    const camLoading   = document.getElementById('camLoading');
    const resultPanel  = document.getElementById('resultPanel');
    const itemList     = document.getElementById('itemList');
    const itemCount    = document.getElementById('itemCount');
    const uploadInput  = document.getElementById('uploadFileInput');
    let stream = null;
    let detectedItems = [];

    // ─── Start / Stop camera ───
    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        camStream.srcObject = stream;
        await camStream.play();
      } catch (err) {
        showToast('Không thể truy cập camera');
      }
    }
    function stopCamera() {
      stream?.getTracks().forEach(t => t.stop());
      stream = null;
    }

    // ─── Open / Close modal ───
    document.getElementById('camBtnImg').addEventListener('click', () => {
      stopCamera(); // BUG-6 fix: dừng stream cũ trước khi mở mới
      camModal.classList.add('show');
      resultPanel.classList.remove('open');
      itemList.innerHTML = '';
      startCamera();
    });
    document.getElementById('closeCamBtn').addEventListener('click', () => {
      camModal.classList.remove('show');
      resultPanel.classList.remove('open');
      stopCamera();
    });

    // ─── Gọi API scan ───
    async function callScanAPI(blob, filename) {
      camLoading.classList.add('show');

      const userId   = localStorage.getItem('userId')   || 1;
      const fridgeId = localStorage.getItem('fridgeId') || 1;
      const token    = localStorage.getItem('jwt_token');

      const formData = new FormData();
      formData.append('file',     blob, filename);
      formData.append('userId',   userId);
      formData.append('fridgeId', fridgeId);

      const headers = { 'ngrok-skip-browser-warning': 'true' };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      try {
        const res = await fetch(API_RECEIPT, { method: 'POST', headers, body: formData });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const aiResult = await res.json();
        console.log('AI result:', aiResult);
        detectedItems = aiResult.items || [];

        camLoading.classList.remove('show');
        stopCamera();
        camModal.classList.remove('show');

        renderResultPanel(detectedItems);
        // Dùng setTimeout nhỏ để transition slide-up mượt hơn
        setTimeout(() => resultPanel.classList.add('open'), 50);
      } catch (err) {
        camLoading.classList.remove('show');
        showToast(' Lỗi AI: ' + err.message);
      }
    }

    // ─── Render result panel ───
    function renderResultPanel(items) {
      itemList.innerHTML = '';
      if (!items || items.length === 0) {
        itemCount.textContent = '0 sản phẩm';
        itemList.innerHTML = `
          <div class="panel-empty">
            <span class="panel-empty-icon">🔍</span>
            AI không nhận ra sản phẩm nào.<br/>Hãy chụp lại rõ hơn!
          </div>`;
        return;
      }
      itemCount.textContent = `${items.length} sản phẩm`;
      items.forEach((item, i) => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.style.animationDelay = `${i * 55}ms`;
        row.innerHTML = `
          <div class="item-emoji">${getEmoji(item.product_name)}</div>
          <div class="item-info">
            <div class="item-name">${item.product_name || '(Không tên)'}</div>
            <div class="item-meta">
              ${item.quantity ? `x${item.quantity}` : ''}
              <select class="expiry-select" onchange="updateItemExpiry(${i}, this.value)">
                <option value="${item.estimated_expiry_days || 7}" hidden>⏳ ${item.estimated_expiry_days || 7} ngày</option>
                <option value="${item.estimated_expiry_days || 7}">🤖 AI đề xuất (${item.estimated_expiry_days || 7} ngày)</option>
                <option value="1">1 ngày</option>
                <option value="3">3 ngày</option>
                <option value="5">5 ngày</option>
                <option value="7">1 tuần</option>
                <option value="14">2 tuần</option>
                <option value="30">1 tháng</option>
              </select>
              ${item.category ? `· ${item.category}` : ''}
            </div>
          </div>
          ${item.price ? `<div class="item-price">${Number(item.price).toLocaleString('vi-VN')}đ</div>` : ''}
        `;
        itemList.appendChild(row);
      });
    }

    // ─── Nút chụp ảnh (camera) ───
    document.getElementById('captureBtn').addEventListener('click', () => {
      if (!stream) { showToast('⚠️ Camera chưa bật!'); return; }
      // Flash
      flash.style.display = 'block';
      setTimeout(() => flash.style.display = 'none', 120);

      const canvas = document.createElement('canvas');
      canvas.width  = camStream.videoWidth  || 1280;
      canvas.height = camStream.videoHeight || 720;
      canvas.getContext('2d').drawImage(camStream, 0, 0);

      canvas.toBlob(blob => callScanAPI(blob, 'capture.jpg'), 'image/jpeg', 0.85);
    });

    // ─── Nút Upload ảnh ───
    document.getElementById('uploadBtn').addEventListener('click', () => uploadInput.click());

    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = '';
      callScanAPI(file, file.name);
    });

    // ─── Chụp lại ───
    document.getElementById('rescanBtn').addEventListener('click', () => {
      resultPanel.classList.remove('open');
      detectedItems = [];
      itemList.innerHTML = '';
      // BUG-5 fix: dừng stream cũ trước khi start lại tránh leak
      stopCamera();
      camModal.classList.add('show');
      startCamera();
    });

    // ─── Lưu vào tủ lạnh ───
    document.getElementById('saveFridgeBtn').addEventListener('click', () => {
      if (detectedItems.length === 0) { showToast('Không có sản phẩm!'); return; }
      sessionStorage.setItem('scannedItems', JSON.stringify(detectedItems));
      showToast('Đã lưu! Đang chuyển trang...');
      setTimeout(() => window.location.href = 'food_list.html', 800);
    });

    // ─── Toast ───
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
    window.updateItemExpiry = function(index, days) {
       let items = JSON.parse(sessionStorage.getItem('scannedItems') || '[]');
       if (items[index]) {
           items[index].estimated_expiry_days = parseInt(days);
           sessionStorage.setItem('scannedItems', JSON.stringify(items));
       }
    };
  </script>
</body>

</html>
