<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Máy Ảnh – Smart Fridge</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #b8a050;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Phone shell ── */
    .phone {
      width: 375px;
      height: 720px;
      border: 8px solid #222;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: #b9f3fb url('../assets/May_anh/man_hinh_chup_bill.png') center/cover no-repeat;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
    }

    /* ── Home Button ── */
    .home-link {
      position: absolute;
      top: 30px;
      left: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      z-index: 10;
    }

    .home-link img {
      width: 20px;
      image-rendering: pixelated;
    }

    /* ── Camera Preview Frame ── */
    .camera-frame {
      position: absolute;
      top: 60px;
      left: 45px;
      width: 270px;
      height: 400px;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Bottom Controls ── */
    .bottom-controls {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      height: 130px;
      z-index: 20;
    }

    .thumbnail-container {
      position: absolute;
      left: 50px;
      transform: translateY(-50%);
      width: 45px;
      height: 40px;
      background: #fff;
      border: 2px solid #ed89b5;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .capture-btn {
      position: absolute;
      left: 50.5%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.1s;
    }

    .capture-btn:active {
      transform: translate(-50%, -50%) scale(0.9);
    }

    .capture-btn img {
      width: 80px;
      display: block;
      image-rendering: pixelated;
    }

    .gallery-btn {
      position: absolute;
      right: 50px;
      transform: translateY(-50%);
      width: 45px;
      height: 40px;
      background: #fff;
      border: 2px solid #ed89b5;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      font-weight: 900;
      color: #ed89b5;
      border-radius: 4px;
    }

    .toast {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 700;
      opacity: 0;
      transition: all 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .confirm-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 160px;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 30;
      border-top: 3px solid #ed89b5;
    }

    .confirm-overlay.active {
      display: flex;
    }

    .btn-group {
      display: flex;
      gap: 15px;
    }

    .action-btn {
      padding: 10px 24px;
      border-radius: 20px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-confirm { background: #ed89b5; color: #fff; }
    .btn-retake { background: #eee; color: #333; }
  </style>
</head>

<body>
  <div class="phone">
    <a href="Index.html" class="home-link">
      <img src="../assets/May_anh/back.png" alt="Back" />
    </a>

    <div class="camera-frame">
      <video id="video" autoplay playsinline></video>
    </div>

    <div class="bottom-controls" id="bottomControls">
      <div class="thumbnail-container">
        <img id="thumbnail" src="" alt="" style="display: none;" />
      </div>
      <div class="gallery-btn" id="galleryBtn">+</div>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
      <button class="capture-btn" id="captureBtn">
        <img src="../assets/May_anh/nut_chup.png" alt="Chụp" />
      </button>
    </div>

    <div class="confirm-overlay" id="confirmOverlay">
      <p style="font-weight: 900; color: #333; font-size: 14px;">Xác nhận gửi ảnh này?</p>
      <div class="btn-group">
        <button class="action-btn btn-retake" id="retakeBtn">Chụp lại</button>
        <button class="action-btn btn-confirm" id="confirmBtn">Gửi ảnh</button>
      </div>
    </div>

    <canvas id="canvas" style="display: none;"></canvas>
    <div class="toast" id="toast"></div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('captureBtn');
    const thumbnail = document.getElementById('thumbnail');
    const toast = document.getElementById('toast');
    const confirmOverlay = document.getElementById('confirmOverlay');
    const bottomControls = document.getElementById('bottomControls');
    const retakeBtn = document.getElementById('retakeBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const galleryBtn = document.getElementById('galleryBtn');
    const fileInput = document.getElementById('fileInput');

    // API Config
    const API_CONFIG = {
      BASE_URL: "/api/v1",
      USER_ID: 1,
      FRIDGE_ID: 1
    };

    async function initCamera() {
      if (!window.isSecureContext) {
        showToast("⚠️ Camera yêu cầu HTTPS hoặc localhost để hoạt động");
        console.error("Camera cannot be accessed in an insecure context.");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        showToast("❌ Không thể truy cập camera");
      }
    }

    captureBtn.onclick = () => {
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      thumbnail.src = canvas.toDataURL('image/png');
      thumbnail.style.display = 'block';
      video.pause();
      bottomControls.style.display = 'none';
      confirmOverlay.classList.add('active');
    };

    retakeBtn.onclick = () => {
      video.play();
      confirmOverlay.classList.remove('active');
      bottomControls.style.display = 'block';
      thumbnail.style.display = 'none';
      fileInput.value = "";
    };

    galleryBtn.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
      if (e.target.files && e.target.files[0]) {
        const reader = new FileReader();
        reader.onload = (event) => {
          thumbnail.src = event.target.result;
          thumbnail.style.display = 'block';
          video.pause();
          bottomControls.style.display = 'none';
          confirmOverlay.classList.add('active');
        };
        reader.readAsDataURL(e.target.files[0]);
      }
    };

    confirmBtn.onclick = () => {
      if (thumbnail.src.startsWith('data:')) {
        const blob = dataURLtoBlob(thumbnail.src);
        processAndUpload(blob);
      }
    };

    function dataURLtoBlob(dataurl) {
      const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while(n--) u8arr[n] = bstr.charCodeAt(n);
      return new Blob([u8arr], {type:mime});
    }

    async function processAndUpload(fileBlob) {
      confirmBtn.disabled = true;
      confirmBtn.innerText = "Đang quét...";
      showToast("🚀 AI đang phân tích hóa đơn...");
      
      const formData = new FormData();
      formData.append("file", fileBlob);
      formData.append("userId", API_CONFIG.USER_ID);
      formData.append("fridgeId", API_CONFIG.FRIDGE_ID);

      try {
        const response = await fetch(`${API_CONFIG.BASE_URL}/scan/receipt`, {
          method: "POST",
          body: formData,
          headers: {
            "ngrok-skip-browser-warning": "69420"
          }
        });

        if (!response.ok) throw new Error("Lỗi Backend");

        const data = await response.json();
        localStorage.setItem('scannedItems', JSON.stringify(data.items || []));
        showToast("✅ Thành công!");
        setTimeout(() => window.location.href = 'food_list.html', 800);
      } catch (err) {
        showToast("❌ Lỗi xử lý ảnh!");
        confirmBtn.disabled = false;
        confirmBtn.innerText = "Gửi lại";
      }
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    initCamera();
  </script>
</body>
</html>
