<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Fridge – Tủ Lạnh Thông Minh</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #b8a050;
      --surface: #fdf5c0;
      --card: rgba(255, 255, 255, 0.85);
      --border: #333;
      --accent: #e67e22;
      --accent2: #7c5cbf;
      --warn: #fdd835;
      --danger: #ff6b6b;
      --text: #333;
      --muted: #777;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Phone shell ── */
    .phone {
      width: 375px;
      height: 812px;
      background: var(--surface) url('../assets/manhinhtulanh.png') center / cover no-repeat;
      border-radius: 40px;
      border: 8px solid #222;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px 4px;
      font-size: 13px;
      font-weight: 700;
      color: #333;
      z-index: 10;
    }

    .status-bar .notch {
      width: 120px;
      height: 24px;
      background: #111;
      border-radius: 0 0 16px 16px;
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px 8px;
    }

    .header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #00b4d8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 17px;
      font-weight: 800;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), #c471ed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      border: 2px solid var(--accent);
    }

    /* ── Emotion bar ── */
    .emotion-strip {
      margin: 4px 16px 10px;
      background: var(--card);
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
    }

    .emotion-strip .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .emotion-strip .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .chip.happy {
      background: #1a3a2a;
      color: #4ade80;
    }

    .chip.hungry {
      background: #3a2a10;
      color: var(--warn);
    }

    .chip.calm {
      background: #1a2a3a;
      color: #60a5fa;
    }

    .emotion-strip .person-tag {
      margin-left: auto;
      font-size: 12px;
      color: var(--accent);
      font-weight: 800;
      background: #0d2a1f;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── Camera feed ── */
    .cam-section {
      padding: 0 16px;
    }

    .cam-card {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: #0a1a10;
      border: 1px solid var(--border);
      height: 220px;
      display: flex;
      align-items: flex-end;
    }

    .cam-bg {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 40% 60%, #c8f56a22 0%, #00e5a010 50%, transparent 80%),
        linear-gradient(160deg, #0a1a10 0%, #091410 100%);
    }

    /* Fridge shelves */
    .shelf {
      position: absolute;
      left: 10px;
      right: 10px;
      height: 2px;
      background: #2a4a30;
      border-radius: 2px;
    }

    .shelf:nth-child(1) {
      top: 55px;
    }

    .shelf:nth-child(2) {
      top: 120px;
    }

    .shelf:nth-child(3) {
      top: 175px;
    }

    /* Food items on shelf */
    .food-dot {
      position: absolute;
      border-radius: 50%;
      opacity: .85;
    }

    /* Cat mascot */
    .cat-wrap {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: catBounce 2.5s ease-in-out infinite;
    }

    @keyframes catBounce {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(-6px);
      }
    }

    .speech-bubble {
      background: #fff;
      color: #111;
      border-radius: 14px;
      padding: 6px 12px;
      font-size: 13px;
      font-weight: 800;
      position: relative;
      margin-bottom: 6px;
      white-space: nowrap;
      box-shadow: 0 4px 12px #0006;
    }

    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #fff;
      border-bottom: none;
    }

    .cat {
      font-size: 56px;
      filter: drop-shadow(0 4px 12px #00e5a040);
    }

    /* Scan overlay */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scanMove 2s linear infinite;
      box-shadow: 0 0 10px var(--accent);
    }

    @keyframes scanMove {
      0% {
        top: 10%;
      }

      100% {
        top: 90%;
      }
    }

    .cam-corners span {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }

    .cam-corners span:nth-child(1) {
      top: 8px;
      left: 8px;
      border-width: 2px 0 0 2px;
      border-radius: 4px 0 0 0;
    }

    .cam-corners span:nth-child(2) {
      top: 8px;
      right: 8px;
      border-width: 2px 2px 0 0;
      border-radius: 0 4px 0 0;
    }

    .cam-corners span:nth-child(3) {
      bottom: 8px;
      left: 8px;
      border-width: 0 0 2px 2px;
      border-radius: 0 0 0 4px;
    }

    .cam-corners span:nth-child(4) {
      bottom: 8px;
      right: 8px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 4px 0;
    }

    .cam-label {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 1px;
      background: #0009;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── Quick Stats row ── */
    .stats-row {
      display: flex;
      gap: 10px;
      padding: 10px 16px;
    }

    .stat-card {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .s-icon {
      font-size: 20px;
    }

    .stat-card .s-val {
      font-size: 18px;
      font-weight: 900;
    }

    .stat-card .s-lbl {
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
    }

    .stat-card.green .s-val {
      color: var(--accent);
    }

    .stat-card.yellow .s-val {
      color: var(--warn);
    }

    .stat-card.purple .s-val {
      color: #c471ed;
    }

    /* ── Food list ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 20px 8px;
    }

    .section-header h2 {
      font-size: 15px;
      font-weight: 800;
    }

    .section-header a {
      font-size: 12px;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    .food-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .food-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform .15s, border-color .15s;
      cursor: pointer;
    }

    .food-item:hover {
      transform: translateX(4px);
      border-color: var(--accent);
    }

    .food-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .food-info {
      flex: 1;
    }

    .food-info .fname {
      font-size: 14px;
      font-weight: 700;
    }

    .food-info .fmeta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .food-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 800;
    }

    .badge-ok {
      background: #0d2a1f;
      color: #4ade80;
    }

    .badge-warn {
      background: #2e2300;
      color: var(--warn);
    }

    .badge-danger {
      background: #2e0d0a;
      color: var(--danger);
    }

    /* ── Suggestion card ── */
    .suggest-card {
      margin: 8px 16px;
      background: linear-gradient(135deg, #0d2a20, #0a1e30);
      border: 1px solid #1e4a3a;
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .suggest-card .s-cat {
      font-size: 36px;
    }

    .suggest-card .s-text h3 {
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
    }

    .suggest-card .s-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .suggest-card .s-btn {
      margin-left: auto;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }

    .suggest-card .s-btn:hover {
      opacity: .85;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      margin-top: auto;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 14px 16px 28px;
      background: var(--card);
      border-top: 1px solid var(--border);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 700;
      cursor: pointer;
      transition: color .15s;
    }

    .nav-item .nav-icon {
      font-size: 22px;
    }

    .nav-item.active {
      color: var(--accent);
    }

    .nav-item.active .nav-icon {
      filter: drop-shadow(0 0 6px var(--accent));
    }

    /* Scan fab */
    .fab {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #00b4d8);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 0 20px #00e5a055;
      transition: transform .15s, box-shadow .15s;
      margin-top: -28px;
    }

    .fab:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #00e5a088;
    }
  </style>
</head>

<body>
  <div class="phone">
    <!-- Status bar -->
    <div class="status-bar">
      <span></span>
      <div class="notch"></div>
      <span></span>
    </div>

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>Smart<span>Fridge</span></h1>
      </div>
      <div class="user-avatar" title="Người dùng">👤</div>
    </div>

    <!-- Emotion strip -->
    <div class="emotion-strip">
      <div>

    <!-- Camera feed -->
    <div class="cam-section">
      <div class="cam-card">

        <!-- Shelves -->
        <div class="shelf" style="top:45px"></div>

        <div class="shelf" style="top:170px"></div>

        <!-- Food dots on shelves -->
        <div class="food-dot" style="width:22px;height:28px;background:#ff6b6b;border-radius:6px;top:16px;left:30px;">
        </div>
        <div class="food-dot" style="width:18px;height:24px;background:#ffd93d;border-radius:6px;top:20px;left:60px;">
        </div>
        <div class="food-dot" style="width:20px;height:22px;background:#6bcb77;border-radius:50%;top:18px;right:40px;">
        </div>
        <div class="food-dot" style="width:16px;height:20px;background:#4d96ff;border-radius:4px;top:79px;left:25px;">
        </div>
        <div class="food-dot" style="width:24px;height:18px;background:#ff9f43;border-radius:8px;top:82px;right:30px;">
        </div>

        <!-- Scan animation -->
        <div class="scan-line"></div>






      </div>
    </div>

    <!-- Stats row -->

    </div>

    <!-- Food list -->

        </div>

      </div>
      <div class="food-item">
        <div class="food-icon" style="background:#1a1a2e"></div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <div class="nav-item active">

      </div>

      <div class="nav-item">

      </div>
      <div class="nav-item">
        <span class="nav-icon"></span>
        <span>Cài đặt</span>
      </div>
    </div>
  </div>
</body>
