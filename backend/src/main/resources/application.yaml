spring:
  application:
    name: FridgeAI

  # Cấu hình MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/fridgeai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: thphat08122007 # Mật khẩu XAMPP/MySQL của bạn

  jpa:
    # ddl-auto: update LÀ CHÌA KHÓA CHO HACKATHON
    # Nó sẽ tự động tạo bảng dựa trên class @Entity của bạn, bạn không cần viết SQL bằng tay!
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format-sql: true

  # Cấu hình nới lỏng dung lượng upload file ảnh
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # Cấu hình JWT Token cho Authentication
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970" # Khóa bí mật 256-bit Base64
    expiration: 86400000 # Thời gian hết hạn của token: 1 ngày (tính bằng milliseconds)

  # Thêm phần này vào dưới cùng của application.yml
app:
  # Thư mục lưu trữ ảnh hóa đơn
  upload-dir: "uploads/receipts"
  ai:
    api-key: ${OPENROUTER_API_KEY:your-default-key-here}
    openrouter-model: google/gemini-2.0-flash-lite-001
    model: "llama3.2-vision"
    base-url: "http://localhost:11434/api/chat"
    bill-scan-prompt: "Bạn là một chuyên gia đọc hóa đơn và an toàn thực phẩm. Hãy trích xuất các mặt hàng THỰC PHẨM/ĐỒ UỐNG từ ảnh. Loại bỏ đồ gia dụng/mỹ phẩm. Với mỗi món, hãy dự đoán 'estimated_expiry_days' dựa trên tính chất sản phẩm (ví dụ: rau củ: 3-5 ngày, thịt tươi: 2-3 ngày, đồ hộp: 365 ngày). Trả về JSON object có mảng 'items' gồm: product_name, quantity, price, estimated_expiry_days, category (ví dụ: 'Thịt', 'Rau củ', 'Sữa', 'Đồ khô'). Chỉ trả về JSON, không giải thích, tiếng Việt UTF-8."

logging:
  level:
    hackathon.fridgeai: DEBUG