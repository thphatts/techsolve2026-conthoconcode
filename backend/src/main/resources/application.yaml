spring:
  application:
    name: FridgeAI

  # Cấu hình MySQL
  datasource:
    url: jdbc:mysql://localhost:3306/fridgeai_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: thphat08122007 # Mật khẩu XAMPP/MySQL của bạn

  jpa:
    # ddl-auto: update LÀ CHÌA KHÓA CHO HACKATHON
    # Nó sẽ tự động tạo bảng dựa trên class @Entity của bạn, bạn không cần viết SQL bằng tay!
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format-sql: true

  # Cấu hình nới lỏng dung lượng upload file ảnh
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # Cấu hình JWT Token cho Authentication
  jwt:
    secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970" # Khóa bí mật 256-bit Base64
    expiration: 86400000 # Thời gian hết hạn của token: 1 ngày (tính bằng milliseconds)

  # Thêm phần này vào dưới cùng của application.yml
app:
  # Thư mục lưu trữ ảnh hóa đơn
  upload-dir: "uploads/receipts"
  ai:
    api-key: ${OPENROUTER_API_KEY:your-default-key-here}
    openrouter-model: google/gemini-2.0-flash-lite-001
    model: "llama3.2-vision"
    base-url: "http://localhost:11434/api/chat"
    bill-scan-prompt: "Bạn là một chuyên gia đọc hóa đơn và phân loại hàng hóa. Nhiệm vụ của bạn là phân tích ảnh hóa đơn và CHỈ trích xuất các mặt hàng là THỰC PHẨM hoặc ĐỒ UỐNG. Hãy TỰ ĐỘNG LOẠI BỎ các mặt hàng không phải đồ ăn như đồ gia dụng, hóa mỹ phẩm, dụng cụ, đồ điện tử hoặc đồ dùng cá nhân (Ví dụ: Nếu có 'thịt bò', 'trứng', 'sữa' thì giữ lại; nếu có 'kem đánh răng', 'dao', 'bột giặt', 'nồi' thì phải bỏ qua). Trả về duy nhất một JSON object chứa mảng 'items' gồm các trường: product_name, quantity, price, estimated_expiry_days. Chỉ trả về JSON, không giải thích. LƯU Ý BẮT BUỘC: Định dạng JSON phải hợp lệ, không dùng ký tự escape Unicode, trả về tiếng Việt chuẩn UTF-8."

logging:
  level:
    hackathon.fridgeai: DEBUG
